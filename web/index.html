<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Harvester</title>
<style>
  :root{ color-scheme: dark;
    --bg:#16161a; --panel:#1d1d22; --panel2:#26262c; --stroke:rgba(255,255,255,.09);
    --text:rgba(255,255,255,.92); --dim:rgba(255,255,255,.55);
    --accent:#348cff; --accent2:#7a4df2; --good:#41cc72; --bad:#ff6b61; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--panel);border-bottom:1px solid var(--stroke);position:sticky;top:0;z-index:5}
  .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:17px}
  header h1{font-size:15px;font-weight:600}
  header .sub{font-size:11px;color:var(--dim)}
  .badges{margin-left:auto;display:flex;gap:8px}
  .badge{font:10px/1 ui-monospace,monospace;color:var(--dim);background:var(--panel2);padding:6px 9px;border-radius:99px;display:flex;gap:5px;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%}
  .wrap{max-width:1000px;margin:0 auto;padding:22px;display:grid;gap:18px}
  .card{background:var(--panel);border:1px solid var(--stroke);border-radius:14px;padding:18px}
  .card h2{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
  .drop{border:1.5px dashed var(--stroke);border-radius:12px;padding:30px;text-align:center;color:var(--dim);cursor:pointer;transition:.2s}
  .drop:hover,.drop.over{border-color:var(--accent);color:var(--text);background:rgba(52,140,255,.06)}
  .drop .big{font-size:34px;margin-bottom:8px;background:linear-gradient(180deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--stroke);color:var(--text);border-radius:8px;padding:9px 12px;font:inherit;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  button{font:inherit;font-weight:600;border:0;border-radius:9px;padding:10px 16px;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  button:disabled{opacity:.45;cursor:default}
  button.ghost{background:var(--panel2);color:var(--text);font-weight:500;padding:7px 12px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .seg{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--stroke);border-radius:10px;background:var(--panel2);margin-bottom:7px;cursor:pointer}
  .seg:hover{border-color:var(--accent)}
  .seg .tag{font:10px/1 ui-monospace,monospace;padding:3px 7px;border-radius:6px;background:var(--accent);color:#fff}
  .seg .meta{color:var(--dim);font-size:12px}
  .spk{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border:1px solid var(--stroke);border-radius:10px;background:var(--panel2);cursor:pointer;margin:0 8px 8px 0}
  .spk.sel{border-color:var(--accent);background:rgba(52,140,255,.12)}
  .muted{color:var(--dim);font-size:12px}
  select{background:var(--panel2);border:1px solid var(--stroke);color:var(--text);border-radius:8px;padding:8px 10px;font:inherit}
  .hidden{display:none}
  .spin{width:14px;height:14px;border:2px solid var(--stroke);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .ai textarea{width:100%;min-height:64px;background:var(--panel2);border:1px solid var(--stroke);color:var(--text);border-radius:8px;padding:10px;font:inherit;resize:vertical}
</style>
</head>
<body>
  <header>
    <div class="logo">🎙️</div>
    <div>
      <h1>Voice Harvester</h1>
      <div class="sub">Harvest a clean voice → pick a speaker → clone → speak, in any language</div>
    </div>
    <div class="badges" id="badges"></div>
  </header>

  <div class="wrap">
    <!-- 1. Import -->
    <div class="card">
      <h2>1 · Import</h2>
      <div class="drop" id="drop">
        <div class="big">⬇</div>
        <div>Drop a video or audio file here, or click to choose</div>
        <div class="muted" style="margin-top:6px">Processed locally — nothing is uploaded</div>
        <input type="file" id="file" class="hidden" accept="audio/*,video/*">
      </div>
      <div class="row" style="margin-top:12px">
        <input type="text" id="path" placeholder="…or paste a file path">
        <button id="analyzeBtn">Analyze</button>
      </div>
    </div>

    <!-- 2. Speakers (AI diarization) -->
    <div class="card hidden" id="speakersCard">
      <h2>2 · Who's speaking <span class="muted" id="anaInfo"></span></h2>
      <div id="speakers"></div>
      <div id="segments" style="margin-top:10px;max-height:240px;overflow:auto"></div>
      <div class="row" style="margin-top:12px">
        <button id="exportBtn">Export selected speaker's voice</button>
        <span id="exportMsg" class="muted"></span>
      </div>
    </div>

    <!-- 3. Clone & speak -->
    <div class="card hidden" id="cloneCard">
      <h2>3 · Clone &amp; speak</h2>
      <div class="muted" id="refLine"></div>
      <div class="row" style="margin:10px 0">
        <input type="text" id="cloneText" placeholder="Type what the voice should say (any language)…" style="flex:1">
        <select id="lang"><option value="">Auto language</option></select>
        <button id="cloneBtn">Speak</button>
      </div>
      <div id="cloneOut" class="muted"></div>
    </div>

    <!-- AI assistant (Ollama) -->
    <div class="card ai hidden" id="aiCard">
      <h2>AI assistant <span class="muted" id="aiModel"></span></h2>
      <textarea id="aiPrompt" placeholder="Ask the local LLM anything — e.g. 'suggest 5 warm sentences to clone in my mom's voice'"></textarea>
      <div class="row" style="margin-top:8px">
        <button id="aiBtn" class="ghost">Ask</button>
        <span id="aiSpin"></span>
      </div>
      <div id="aiReply" style="margin-top:10px;white-space:pre-wrap"></div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
